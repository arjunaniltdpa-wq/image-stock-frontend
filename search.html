<script>
const API_BASE = "https://api.pixeora.com";

const params = new URLSearchParams(window.location.search);
let query = params.get("query") || params.get("q");

const keywordSpan = document.querySelector(".keyword");
const imageCountDiv = document.getElementById("image-count");

const relatedSection = document.getElementById("related-section");
const relatedContainer = document.getElementById("related-images");

/* MAIN MASONRY */
const masonry = document.getElementById("masonry");
const cols = Array.from(masonry.querySelectorAll(".masonry-col"));
let colIndex = 0;

/* Search Pagination */
let nextCursor = null;
let imageCounter = 0;


/* DOWNLOAD */
function downloadImage(rawName) {
  const url = `${API_BASE}/api/images/download/${encodeURIComponent(rawName)}`;
  window.location.href = url;
}

/* DELEGATED DOWNLOAD */
document.addEventListener("click", (ev) => {
  const overlay = ev.target.closest && ev.target.closest(".download-overlay");
  if (overlay) {
    ev.stopImmediatePropagation();
    ev.preventDefault();
    const raw = overlay.getAttribute("data-file");
    if (raw) downloadImage(raw);
    return;
  }
}, true);

/* CARD TEMPLATE */
function createCard(img, index = 999) {
  const div = document.createElement("div");
  div.classList.add("image-item");

if (!img.thumbnailUrl)
  return null;  
  const url = img.thumbnailUrl;

  const safeFileAttr = String(img.fileName || "").replace(/"/g, "&quot;");

  div.innerHTML = `
    <div class="image-wrapper">
      <div class="skeleton"></div>
      <a href="/photo/${img.slug || ""}-${img._id || ""}" class="image-link">
        <img
          src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
          data-src="${url}"
          loading="lazy"
          decoding="async"
          class="lazy-img image-load"
          alt="${img.title || ''}"
          ${index < 2 ? 'fetchpriority="high"' : ''}
        >
      </a>
      <span class="download-overlay" data-file="${safeFileAttr}"></span>
    </div>
  `;
  return div;
}

function createAdCard() {
  const adDiv = document.createElement("div");
  adDiv.classList.add("image-item", "ad-item");

  adDiv.innerHTML = `
    <div class="image-wrapper ad-wrapper">
      <span class="ad-label">Advertisement</span>

      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-4549865852809903"
           data-ad-slot="5554225959"
           data-ad-format="rectangle"></ins>
    </div>
  `;

  setTimeout(() => {
    try {
      (adsbygoogle = window.adsbygoogle || []).push({});
    } catch (e) {}
  }, 100);

  return adDiv;
}

/* COLUMN INSERT */
function addToNextColumn(card) {
  cols[colIndex].appendChild(card);
  colIndex = (colIndex + 1) % cols.length;
}

/* ================= ULTRA FAST LAZY LOAD ================= */

let imageObserver;

function lazyLoadInit() {

  if (!imageObserver) {

    imageObserver = new IntersectionObserver((entries, obs) => {

      entries.forEach(entry => {

        if (!entry.isIntersecting) return;

        const img = entry.target;

        img.src = img.dataset.src;

        img.decode?.().catch(() => {});

        img.onload = () => {

          requestAnimationFrame(() => {

            img.classList.add("image-loaded");

            const skeleton =
              img.closest(".image-wrapper")
              ?.querySelector(".skeleton");

            skeleton?.remove();

          });

        };

        obs.unobserve(img);

      });

    }, {
      rootMargin: "350px 0px",
      threshold: 0.01
    });

  }

  document.querySelectorAll("img.lazy-img:not([data-observed])")
    .forEach(img => {

      img.dataset.observed = "true";

      imageObserver.observe(img);

    });

}

function preloadFirstRow(images) {

  document
  .querySelectorAll(
    'link[data-search-preload]'
  )
  .forEach(el => el.remove());

  images.slice(0, 2).forEach(img => {

    if (!img.thumbnailUrl)
      return;

    const link =
    document.createElement("link");

    link.rel = "preload";
    link.as = "image";

    link.href =
    img.thumbnailUrl;

    link.fetchpriority = "high";

    link.dataset.searchPreload = "1";

    document.head.appendChild(link);

  });

}
/* ================= LOAD FIRST SEARCH RESULTS ================= */
const FIRST_RENDER_COUNT = 8;
const SCROLL_BATCH = 6;

let bufferedImages = [];
let bufferIndex = 0;

async function loadSearchFirst(q) {
  try {
    // 🟢 1️⃣ INSTANT skeletons (NO WAIT)
    cols.forEach(c => (c.innerHTML = ""));
    colIndex = 0;
    imageCounter = 0;

    for (let i = 0; i < FIRST_RENDER_COUNT; i++) {
      const sk = document.createElement("div");
      sk.className = "image-item skeleton-item";  
      sk.innerHTML = `
        <div class="image-wrapper">
          <div class="skeleton"></div>
        </div>
      `;
      addToNextColumn(sk);
    }

    await new Promise(resolve =>
      requestAnimationFrame(resolve)
    );

    const res = await fetch(
      `${API_BASE}/api/search/first?q=${encodeURIComponent(q)}&limit=16`
    );
    const data = await res.json();

    bufferedImages = data.images || [];
    bufferIndex = 0;
    nextCursor = data.nextCursor;
    imageCountDiv.textContent =
    "Thousands of Images";

    // REMOVE ONLY skeleton items
    document.querySelectorAll(".image-item.skeleton-item")
      .forEach(el => el.remove());

    colIndex = 0;

    if (!bufferedImages.length) {
      masonry.innerHTML = "<p>No images found.</p>";
      loadRelatedInitial(q);
      return;
    }

    relatedSection.style.display = "none";

    bufferedImages
    .slice(0, FIRST_RENDER_COUNT)
    .forEach((img, i) => {
      addCardWithAd(img, i);
    });

    preloadFirstRow(bufferedImages);

    bufferIndex = FIRST_RENDER_COUNT;

    if (bufferedImages.length <= 20) {

      bufferedImages
      .slice(FIRST_RENDER_COUNT)
      .forEach(img => {

        addCardWithAd(img);

      });

    }

    lazyLoadInit();

  } catch (err) {
    console.error("SEARCH FIRST ERROR:", err);
  }
}

let isAppending = false;

async function maybeAppendMore() {

  if (isAppending) return;

  if (bufferIndex >= bufferedImages.length)
    return;

  isAppending = true;

  const batch = bufferedImages.slice(
    bufferIndex,
    bufferIndex + SCROLL_BATCH
  );

  bufferIndex += SCROLL_BATCH;

  // render in micro chunks
  for (let i = 0; i < batch.length; i++) {

    addCardWithAd(batch[i]);

    // every 2 items → yield thread
    if (i % 2 === 0) {

      await new Promise(resolve =>
        requestAnimationFrame(resolve)
      );

    }

  }

  lazyLoadInit();

  isAppending = false;
}

/* ================= LOAD NEXT SEARCH RESULTS ================= */

async function loadSearchNext() {
  if (!nextCursor) return;

  const res = await fetch(
    `${API_BASE}/api/search/next?q=${encodeURIComponent(query)}&cursor=${nextCursor}&limit=16`
  );
  const data = await res.json();
  const images = data.images || [];

  nextCursor = data.nextCursor;

  for (let i = 0; i < images.length; i++) {

    addCardWithAd(images[i]);

    if (i % 2 === 0) {

      await new Promise(resolve =>
        requestAnimationFrame(resolve)
      );

    }

  }

  lazyLoadInit();
}

/* ================= RELATED FALLBACK ================= */

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

let relatedAll = [];
let relatedIndex = 0;
const RELATED_BATCH = 30;

async function loadRelatedInitial(keyword) {
  relatedSection.style.display = "block";

  const r = await fetch(`${API_BASE}/api/images/popular-latest?limit=200`);
  const pop = await r.json();
  relatedAll = shuffle(pop.images || []);
  relatedIndex = 0;
  loadNextRelatedBatch();
}

function loadNextRelatedBatch() {

  const relatedCols =
  relatedContainer.querySelectorAll(".related-col");

  const batch =
  relatedAll.slice(
    relatedIndex,
    relatedIndex + RELATED_BATCH
  );

  if (!batch.length) return;

  let col = 0;

  batch.forEach(img => {

    const card = createCard(img);

    if (!card) return;

    relatedCols[col]
    .appendChild(card);

    col =
    (col + 1) %
    relatedCols.length;

  });

  relatedIndex += RELATED_BATCH;

  lazyLoadInit();

}

const loadTrigger = document.createElement("div");

loadTrigger.id = "scroll-trigger";

document.body.appendChild(loadTrigger);

const scrollObserver =
new IntersectionObserver((entries) => {

  entries.forEach(entry => {

    if (entry.isIntersecting) {

      maybeAppendMore();

    }

  });

}, {
  rootMargin: "350px"
});

scrollObserver.observe(loadTrigger);

/* SEARCH REDIRECT */
function redirectSearch() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return false;

  window.location.href = `/search.html?query=${encodeURIComponent(q)}`;
  return false;
}

window.addEventListener("popstate", () => {
  const params = new URLSearchParams(window.location.search);
  const q = params.get("query");
  if (q) {
    query = q; // 🔥 important
    keywordSpan.textContent = `"${q[0].toUpperCase() + q.slice(1)}"`;
    loadSearchFirst(q);
  }
});

// 🔥 INITIAL PAGE LOAD
if (query) {
  keywordSpan.textContent = `"${query[0].toUpperCase() + query.slice(1)}"`;
  loadSearchFirst(query);
}

/* ================= Top Button ================= */
const goTopBtn = document.getElementById("goTopBtn");

/* PREMIUM HEADER HIDE */

const premiumHeader = document.getElementById("premiumHeader");

let lastScroll = 0;

window.addEventListener("scroll", () => {

  const currentScroll = window.pageYOffset;

  if(currentScroll > lastScroll && currentScroll > 120){

    premiumHeader.classList.add("hide");

  }else{

    premiumHeader.classList.remove("hide");

  }

  lastScroll = currentScroll;

});


goTopBtn.addEventListener("click", () => {
  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
});

function addCardWithAd(img, index = 999) {
  const card = createCard(img, index);
  if (!card) return;

  addToNextColumn(card);
  imageCounter++;

  // Insert ad after every 15 images
  if (imageCounter > 25 && imageCounter % 20 === 0) {
    addToNextColumn(createAdCard());
  }
}

function handleAdsVisibility() {

  // Hide ads if running locally
  if (location.protocol === 'file:') {
    document.querySelectorAll(
      '.ad-section, .ad-item, .banner-ad, .side-ad-vertical, .bottom-sticky-ad'
    ).forEach(ad => ad.style.display = 'none');
    return;
  }

  document.querySelectorAll('ins.adsbygoogle').forEach(ins => {

    const container = ins.closest(
      '.ad-section, .ad-item, .banner-ad, .side-ad-vertical, .bottom-sticky-ad'
    );

    setTimeout(() => {
      if (!ins.querySelector("iframe")) {
        if (container) container.style.display = 'none';
      }
    }, 2500);

  });
}

// Run after page load
window.addEventListener("load", handleAdsVisibility);

// Re-check after every ad push
const originalPush = (window.adsbygoogle = window.adsbygoogle || []).push;
window.adsbygoogle.push = function () {
  originalPush.apply(this, arguments);
  setTimeout(handleAdsVisibility, 2500);
};

/* COOKIE */
document.addEventListener("DOMContentLoaded", function () {
  const banner = document.getElementById("cookie-banner");
  const acceptBtn = document.getElementById("cookie-accept");

  if (!localStorage.getItem("cookieConsent")) {
    setTimeout(() => {
      banner.classList.add("show");
    }, 500);
  }

  acceptBtn.addEventListener("click", () => {
    localStorage.setItem("cookieConsent", "true");
    banner.classList.remove("show");
  });
});


/* 🔥 SCROLL-AWARE LEGAL BAR */
let lastScrollTop = 0;
const legalBar = document.getElementById("legalBar");

window.addEventListener("scroll", () => {
  let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

  if (scrollTop > lastScrollTop) {
    // scrolling down
    legalBar.classList.add("hidden");
  } else {
    // scrolling up
    legalBar.classList.remove("hidden");
  }

  lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
});

const revealElements = document.querySelectorAll(".reveal-on-scroll");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("revealed");
    }
  });
}, { threshold: 0.2 });

revealElements.forEach(el => observer.observe(el));
</script>
